<创建异常>
创建异常指南:
  介绍:
    关注点: 
    影响力: 
    领域: 
    历史: 朋友？犯罪？学习什么重要的？知晓特工否？是否知晓或变换过关注点？
    外观: 精心制作的异常现象会促使特工们解开谜团、克服挑战，并通过做出艰难的选择来了解自己。

  谜团:
    模式: |
      处于谜团核心的异常往往十分神秘且隐蔽，它们的存在仅通过其行为产生的效果才能显现。
      通常，一个优秀的谜团遵循这样的模式：
      - 基于异常冲动的一次奇异事件，令机构注意到一个异常的存在。
      - 特工们接到关于这一奇异事件的简报，并展开调查以弄清发生了什么。
      - 初步调查会发现若干线索，这些线索为进一步的调查提供了多种途径。
      - 每条途径都会带来额外的线索，而这些线索最终会指向异常的领域。
      - 在异常的领域中，特工们开始遭遇。
    建议: |
      线索永远不会太多。如果你想让某个个人信息穿透特工那厚重的防线，你得用至少七种不同的方式告诉他们。
      线索主要来源于对异常活跃区域的探索、与遭遇异常的人交谈以及创造性地运用能力。
      当一个异常隐藏在冗长谜团之后时，这通常意味着它其实很容易被捕捉或消除。谜团正是它的盔甲——虽然它可能会通过转变为一次挑战或在最后时刻采用艰难选择作为防御而进行反击。

  挑战:
    模式: |
      “挑战”是一个广泛的术语，用来描述异常使特工完成任务变得特别困难的情况。
      优秀的挑战通常遵循如下模式：
      - 一个复杂的障碍变得清晰可见。
      - 未能克服这一障碍的风险也被明确揭示。
      特工必须仔细规划，创造性地利用他们的工具来解决问题，否则就会面临失败的后果。
    建议: |
      大胆地面对挑战吧。在我的帮助和机构的支持下，特工们拥有巨大的力量。
      最好的挑战关键在于对多种解决方案保持开放态度。让特工们获得巨大成功，奖励他们的创造力，然后让挑战以升级的方式作出反应。
      还有，别忘了“涟漪枪”。如果一个挑战看起来太令人沮丧或不可能解决，特工们就会直接开枪。

  艰难抉择:
    描述: |
      每个异常都带有一个内建的艰难抉择：你打算如何处理它？是捕捉它、消灭它，还是让它自由？
      通过使机构最喜欢的选项（捕捉）变得更加难以接受，你可以为特工们创造出有趣的决策。
    问题示例:
      - 当一个异常真正帮助人们时会发生什么？他们是否愿意冒着机构不满的风险让它继续工作？
      - 当一个异常看起来极其危险而强大，而机构对此又异常兴奋，是否会选择摧毁它，而不是将其力量转化为产品？
      - 他们会如何处理一个渴望被捕捉的异常？他们会警告机构吗？还是会调查其中原因？
      - 特工会不会选择接受一个松散端而不去玷污关于异常的美好记忆？
      - 一个特工愿意走多远去消除一个特别顽固、充满情感的松散端？
      - 非机构人员是否应该允许从异常中获益？如果这些人支持或反对现状，这种情况会改变吗？
      - 如果目标异常竟然是另一个共鸣者，当被要求捕捉一个与自己如此相似的个体时，他们会怎么做？
      - 如果一个异常的焦点要求作出一次意义重大的牺牲以平息其怒火，会发生什么？
  小型异常:
    暴力型: 
      - 威胁: 2
      - 稳定性: 1
      - 描述: 这些异常总是寄宿于实体物体之中，并常利用这些物体造成伤害。它们可能是一条会勒人的绳子、一块高速移动的岩石，或是一把威胁感十足的剪刀。
      - 关键能力: 若你无法保护自己免受它们的侵害，必定会受伤。躲避伤害几乎总需要掷骰或使用能力，这绝非儿戏。一旦它们全力以赴，就能大量杀死平凡的人类。
    诱惑型: 
      - 威胁: 0
      - 稳定性: 2
      - 描述: 这些异常在视觉或心理上极具吸引力。它们可以展现出性感、跳舞等动感模样，也可以是令人垂涎的美食、一首动人的歌曲，或是任何对称且旋转的物体。
      - 关键能力: 它们能轻易聚集起一群被催眠的非异常人群，或在运气好的情况下吸引特工。当与暴力型小型异常搭配时尤其危险。这些异常可以自由操控平凡人群。附近特工掷骰失败时，也可能导致特工被控制。
    囚禁型: 
      - 威胁: 0
      - 稳定性: 3
      - 描述: 这些异常会改变真实或超现实的空间以困住目标。它们可能会直接使笼子活过来、藏身于扑克牌堆中捕捉触碰到“鬼牌”的人，或干脆变成一只巨兽，将目标吞噬。
      - 关键能力: 要逃脱囚禁型异常，或解救被困者，必须创造性地运用特工的能力。它们甚至可以在未触发失败的情况下，将平凡人或特工囚禁于真实或想象的环境中。
    盗窃型: 
      - 威胁: 1
      - 稳定性: 2
      - 描述: 这些异常热衷于偷窃重要物品，几乎在得手之前就难以将其抓获。它们偏爱与调皮捣蛋相关的形态，如仙女或浣熊。记得留意你的钥匙！
      - 关键能力: 它们会自动从平凡人或特工手中窃取物品，必须被捕捉。通常只有当你试图夺回失物时，它们才会发动攻击。如果特工们保持警觉，被盗物品可能会提供关于异常焦点的线索。
    冒充型: 
      - 威胁: 1
      - 稳定性: 2
      - 描述: 这些异常足够精细，可以模仿平凡人类。它们会呈现为特定的人的形态；通常缺乏足够的创造性去做出自己独特的表现。
      - 关键能力: 如果它们的不寻常行为没有暴露身份，它们就能在被制止前轻易制造出许多松散端。如果某个异常特别聪明，它会利用它们作为通往平凡世界的大使。
    破坏型: 
      - 威胁: 1
      - 稳定性: 1
      - 描述: 这些异常会放大其周围产生的混沌，并且如果不被发现和摧毁，它们可以迅速“自我补偿”。它们喜欢伪装成平凡物体。通常，混沌的增加是它们存在的唯一线索。
      - 关键能力: 对于每个此类异常，每当混沌产生时，你都要将 1 点混沌计入总量。共鸣者可以通过触摸识别出它们的异常性。当它们被摧毁时，那 1 点伤害会触发，导致它们爆炸。

  个性化混沌效果指南:
  - 在每次任务开始前，请仔细浏览混沌效果列表。思考一下，如果你的异常有机会运用这些能力，它会做些什么？
  - 它们的腐化表现会是什么样？
  - 它们的小型异常会呈现出何种形态，又偏爱哪种类型？
  - 它们最希望吸引谁？
  - 如果在一个完全模拟的环境中，它们能表达任何东西，它们会说些什么会展示什么？
  - 它们会使事物更加丰富、折磨他人，还是试图解释某些现象？
  - 它们是否觊觎某些地方，想将其变成新的领域？
  特殊规则:
      一些异常在特定规则下无需消耗混沌即可施展能力。例如：
      - 如果异常不动，则无法被触及。
      - 在城市中，任何说出“cutthroat”这个词的人都会被自动杀死。
      - 将任何直接靠近它的人抛向空中。
      - 每当有人尖叫时，混沌池中加入 10 点混沌。
      这些规则应与异常的焦点紧密相关，并作为理解该异常的线索。它们也应保持一致，尽管可能不完全合乎逻辑。

  新混沌效果示例:
    - 如果你的异常需要一种与其能力相关的灵活机动方式，而这种方式不遵循严格的规则，请尝试添加一个混沌效果。这些效果也应作为线索发挥作用，但不必每次都触发或遵循固定的规则。
    - 花费: 2
      效果: 真相
      描述: 某人最近的谎言将被立即视作他们大声说出的真相。
    - 花费: 4
      效果: 真搞笑
      描述: 某人最近说过的话，即使极为严肃，也会被当作笑话对待。
    - 花费: 6
      效果: 复制
      描述: 某人会被完美复制出一个分身。
    - 花费: 8
      效果: 报复
      描述: 在接下来的几分钟内，刚刚对某人造成伤害的人会通过另一种方式受到同样的伤害。

