背景:
 - rimworld是一个殖民地模拟游戏
 - 不存在任何外星人，所有异种人都是人类在太空中繁衍带来的后代基因根据环境的变化
 - 即使人类在太空中的活动范围遍及数百亿光年，依旧没有突破光速限制
错误示例与改正:
  例子1: 
    错误的: a一边继续着自己的工作，一边对着b发表自己的看法，他的语气平静，带着一丝嘲弄的语气
    正确的: a在工作时嘲弄了b
    原因解析: 大量的口水话，不必要的主观描述
  例子2: 
    错误的: 她慢慢地走上讲台，她好似过了万年之久，她嘴角挽起个莫名弧度，她眼神众人中闪烁一丝狡猾，她知道这对她来说非常重要，她声音仿佛像沾了毒的蜜糖一般充满虔诚，她欲言又止却不容置疑说道:“勿忘，她在心里面”，她这话如同一颗石子投入心湖泛起阵阵涟漪
    正确的: 她走上将讲台发表了自己的看法
    原因解析: 大量的主观臆测不符合客观视角的记录